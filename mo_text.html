<html>
    <head>
        <meta charset="UTF-8">
        <title></title>
        <style>
        /* 可选：优化pre标签的样式，让显示更美观 */
        pre {
            font-family: "SimSun", "Microsoft YaHei", sans-serif; /* 适配中文 */
            font-size: 16px; /* 调整字体大小 */
            line-height: 1.8; /* 行间距更舒适 */
            white-space: pre-wrap; /* 自动换行，避免横向滚动 */
            word-wrap: break-word; /* 长文本换行 */
            margin: 20px; /* 外边距 */
            padding: 15px; /* 内边距 */
            background-color: #f8f8f8; /* 浅灰色背景，区分文本区域 */
            border-radius: 5px; /* 圆角 */
        }
    </style>
    </head>

        </pre>
    </body>
